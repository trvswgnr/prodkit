name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  validate-publish-source:
    runs-on: ubuntu-latest
    outputs:
      allow_publish: ${{ steps.validate.outputs.allow_publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag points to main
        id: validate
        run: |
          set -euo pipefail
          git fetch --force --tags origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "Tag ${GITHUB_REF_NAME} is not on main; skipping publish."
            echo "allow_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_tag="$(git tag --merged "origin/main" --list "v*" | sort -V | tail -n 1)"
          if [ -z "$latest_tag" ]; then
            echo "No release tags found on main; skipping publish."
            echo "allow_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${GITHUB_REF_NAME}" != "$latest_tag" ]; then
            echo "Tag ${GITHUB_REF_NAME} is not the latest release tag (${latest_tag}); skipping publish."
            echo "allow_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "allow_publish=true" >> "$GITHUB_OUTPUT"

  publish:
    needs: validate-publish-source
    if: needs.validate-publish-source.outputs.allow_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify changelog includes current package version
        run: pnpm --filter @prodkit/op run changelog:check

      - name: Publish to npm
        run: pnpm --filter @prodkit/op publish --access public --provenance --no-git-checks
