name: Release

on:
  push:
    tags:
      - "op-v*"
      - "std-v*"

permissions:
  contents: read
  id-token: write

jobs:
  validate-publish-source:
    runs-on: ubuntu-latest
    outputs:
      allow_publish: ${{ steps.validate.outputs.allow_publish }}
      package_id: ${{ steps.validate.outputs.package_id }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Validate tag points to main
        id: validate
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          package_id="${tag%%-v*}"

          case "$package_id" in
            op|std) ;;
            *)
              echo "Unsupported release tag prefix: ${tag}"
              echo "allow_publish=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          version="${tag#${package_id}-v}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Unsupported release tag version: ${tag}"
            echo "allow_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --force --tags origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "Tag ${tag} is not on main; skipping publish."
            echo "allow_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_tag="$(git tag --merged "origin/main" --list "${package_id}-v*" | sort -V | tail -n 1)"
          if [ -z "$latest_tag" ]; then
            echo "No ${package_id}-v* release tags found on main; skipping publish."
            echo "allow_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${tag}" != "$latest_tag" ]; then
            echo "Tag ${tag} is not the latest ${package_id} release tag (${latest_tag}); skipping publish."
            echo "allow_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "package_id=${package_id}" >> "$GITHUB_OUTPUT"
          echo "allow_publish=true" >> "$GITHUB_OUTPUT"

  publish:
    needs: validate-publish-source
    if: needs.validate-publish-source.outputs.allow_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Resolve npm package
        run: |
          case "${{ needs.validate-publish-source.outputs.package_id }}" in
            op) echo "NPM_FILTER=@prodkit/op" >> "$GITHUB_ENV" ;;
            std) echo "NPM_FILTER=@prodkit/std" >> "$GITHUB_ENV" ;;
            *)
              echo "Unsupported package id: ${{ needs.validate-publish-source.outputs.package_id }}"
              exit 1
              ;;
          esac

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24.14.0"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build release artifacts
        run: |
          pnpm --filter @prodkit/op run build
          if [ "$NPM_FILTER" != "@prodkit/op" ]; then
            pnpm --filter "$NPM_FILTER" run build
          fi

      - name: Verify changelog includes current package version
        run: pnpm --filter "$NPM_FILTER" run changelog:check

      - name: Publish to npm
        run: pnpm --filter "$NPM_FILTER" publish --access public --provenance --no-git-checks
