name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.5.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.14.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependency signatures
        run: pnpm -r exec npm audit signatures

      - name: Run project quality gate
        env:
          CHANGELOG_API_BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || (github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000' && github.event.before) || '' }}
        run: pnpm run gate

      - name: Publish op coverage report
        run: pnpm --filter @prodkit/op run coverage

      - name: Upload op coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: op-coverage
          path: packages/op/coverage
          if-no-files-found: error

  better-result-compatibility:
    name: better-result / ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: lower bound
            better_result: "2.9.0"
          - label: highest supported
            better_result: "^2.9.0"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.5.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.14.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Select better-result compatibility version
        env:
          BETTER_RESULT_RANGE: ${{ matrix.better_result }}
        run: |
          set -euo pipefail
          version="$(pnpm view "better-result@${BETTER_RESULT_RANGE}" version)"
          echo "Resolved better-result@${BETTER_RESULT_RANGE} to ${version}"
          pnpm --filter @prodkit/op add --save-dev "better-result@${version}"

      - name: Run op compatibility suite
        run: |
          pnpm --filter @prodkit/op run build
          pnpm --filter @prodkit/op run typecheck
          pnpm --filter @prodkit/op run test

  runtime-smoke:
    name: runtime smoke / ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: bun
            label: bun
            node_version: "24.14.0"
          - runtime: deno
            label: deno
            node_version: "24.14.0"
          - runtime: edge
            label: edge
            node_version: "24.14.0"
          - runtime: node
            label: node-22
            node_version: "22"
          - runtime: node
            label: node-24
            node_version: "24"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.5.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node_version }}
          cache: "pnpm"

      - name: Setup Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.13"

      - name: Setup Deno
        if: matrix.runtime == 'deno'
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: "2.7.14"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run runtime smoke
        run: pnpm --filter @prodkit/tools run runtime:smoke:${{ matrix.runtime }}

  bundle-size:
    name: bundle size
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.5.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.14.0"
          cache: "pnpm"

      - name: Package size report
        uses: preactjs/compressed-size-action@66325aad6443cb7cf89c4bfcd414aea2367cda94 # v2.9.1
        with:
          build-script: "build:size"
          pattern: "packages/op/dist/bundle-size/*.min.mjs"
          compression: "gzip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
